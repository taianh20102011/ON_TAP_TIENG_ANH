<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Word Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-indigo-600 mb-2">Word Form & Quiz</h1>
            <p class="text-gray-500">Tra từ, học Word Form và kiểm tra kiến thức ngay lập tức.</p>
        </div>

        <div class="glass p-6 rounded-2xl shadow-xl mb-8 flex gap-2">
            <input type="text" id="wordInput" placeholder="Nhập từ tiếng Anh (vđ: Success, Beauty...)" 
                   class="flex-1 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
            <button onclick="lookupWord()" id="searchBtn" class="bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-700 transition-all font-semibold">
                Tra từ
            </button>
        </div>

        <div id="contentArea" class="hidden grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="md:col-span-2 space-y-6">
                <div id="resultCard" class="glass p-6 rounded-2xl shadow-lg border-l-4 border-indigo-500">
                    <div id="wordHeader" class="mb-4">
                        <h2 id="displayWord" class="text-3xl font-bold text-gray-800 capitalize"></h2>
                        <p id="phonetic" class="text-indigo-500 italic"></p>
                    </div>
                    <div id="meanings" class="space-y-4"></div>
                </div>

                <div id="quizCard" class="glass p-6 rounded-2xl shadow-lg border-l-4 border-green-500">
                    <h3 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                        <span class="mr-2">📝</span> Kiểm tra kiến thức
                    </h3>
                    <div id="quizContainer" class="space-y-6"></div>
                    <button onclick="checkQuiz()" id="checkBtn" class="mt-4 w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 hidden">
                        Nộp bài
                    </button>
                </div>
            </div>

            <div class="space-y-6">
                <div class="glass p-6 rounded-2xl shadow-lg">
                    <h3 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                        <span class="mr-2">📚</span> Lịch sử tra từ
                    </h3>
                    <ul id="historyList" class="space-y-2 max-h-96 overflow-y-auto">
                        </ul>
                    <button onclick="clearHistory()" class="mt-4 text-sm text-red-500 hover:underline">Xóa lịch sử</button>
                </div>
            </div>

        </div>

        <div id="errorBox" class="hidden text-center p-10 glass rounded-2xl shadow-lg">
            <p class="text-red-500 font-semibold">Không tìm thấy từ này trong từ điển. Thử lại nhé!</p>
        </div>
    </div>

    <script>
        const input = document.getElementById('wordInput');
        let currentQuizData = [];

        // Hỗ trợ Enter để tra từ
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') lookupWord();
        });

        async function lookupWord() {
            const word = input.value.trim().toLowerCase();
            if (!word) return;

            const btn = document.getElementById('searchBtn');
            btn.innerHTML = "Đang tải...";
            btn.disabled = true;

            try {
                const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                if (!response.ok) throw new Error('Not found');
                const data = await response.json();
                
                renderResults(data[0]);
                saveToHistory(data[0].word);
                generateQuiz(data[0]);
                
                document.getElementById('contentArea').classList.remove('hidden');
                document.getElementById('errorBox').classList.add('hidden');
            } catch (err) {
                document.getElementById('contentArea').classList.add('hidden');
                document.getElementById('errorBox').classList.remove('hidden');
            } finally {
                btn.innerHTML = "Tra từ";
                btn.disabled = false;
            }
        }

        function renderResults(data) {
            document.getElementById('displayWord').innerText = data.word;
            document.getElementById('phonetic').innerText = data.phonetic || "";
            
            const meaningsDiv = document.getElementById('meanings');
            meaningsDiv.innerHTML = "";

            data.meanings.forEach(m => {
                const section = document.createElement('div');
                section.innerHTML = `
                    <div class="flex items-center gap-2 mb-1">
                        <span class="bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded text-sm font-bold uppercase">${m.partOfSpeech}</span>
                    </div>
                    <ul class="list-disc ml-5 text-gray-700 space-y-1">
                        ${m.definitions.slice(0, 3).map(d => `<li>${d.definition}</li>`).join('')}
                    </ul>
                `;
                meaningsDiv.appendChild(section);
            });
        }

        function generateQuiz(data) {
            const container = document.getElementById('quizContainer');
            const checkBtn = document.getElementById('checkBtn');
            container.innerHTML = "";
            currentQuizData = [];

            // Lấy các định nghĩa hoặc ví dụ làm câu hỏi
            let count = 0;
            data.meanings.forEach(m => {
                m.definitions.forEach(def => {
                    if (count < 2) {
                        const question = {
                            word: data.word,
                            pos: m.partOfSpeech,
                            definition: def.definition
                        };
                        currentQuizData.push(question);
                        
                        const qDiv = document.createElement('div');
                        qDiv.className = "p-4 bg-gray-50 rounded-xl border border-gray-200";
                        qDiv.innerHTML = `
                            <p class="text-sm font-medium text-gray-600 mb-2">Câu hỏi ${count + 1}: Điền từ phù hợp với loại từ <b class="text-indigo-600 underline">${m.partOfSpeech}</b></p>
                            <p class="italic text-gray-800 mb-3">"${def.definition}"</p>
                            <input type="text" data-index="${count}" class="quiz-input w-full p-2 border rounded border-gray-300 focus:ring-2 focus:ring-green-400 outline-none" placeholder="Nhập đáp án...">
                            <p id="feedback-${count}" class="mt-2 text-sm hidden font-semibold"></p>
                        `;
                        container.appendChild(qDiv);
                        count++;
                    }
                });
            });

            if (count > 0) checkBtn.classList.remove('hidden');
        }

        function checkQuiz() {
            const inputs = document.querySelectorAll('.quiz-input');
            inputs.forEach((input, idx) => {
                const val = input.value.trim().toLowerCase();
                const correct = currentQuizData[idx].word.toLowerCase();
                const feedback = document.getElementById(`feedback-${idx}`);
                
                feedback.classList.remove('hidden');
                if (val === correct) {
                    feedback.innerText = "Chính xác! Cố gắng phát huy nhé.";
                    feedback.className = "mt-2 text-sm text-green-600 font-semibold";
                    input.className = "quiz-input w-full p-2 border rounded border-green-500 bg-green-50";
                } else {
                    feedback.innerText = `Chưa đúng rồi. Đáp án là: ${correct}`;
                    feedback.className = "mt-2 text-sm text-red-500 font-semibold";
                    input.className = "quiz-input w-full p-2 border rounded border-red-500 bg-red-50";
                }
            });
        }

        // Local Storage Logic
        function saveToHistory(word) {
            let history = JSON.parse(localStorage.getItem('wordHistory') || '[]');
            if (!history.includes(word)) {
                history.unshift(word);
                history = history.slice(0, 20); // Giữ lại 20 từ gần nhất
                localStorage.setItem('wordHistory', JSON.stringify(history));
            }
            displayHistory();
        }

        function displayHistory() {
            const historyList = document.getElementById('historyList');
            const history = JSON.parse(localStorage.getItem('wordHistory') || '[]');
            historyList.innerHTML = history.map(w => `
                <li class="group flex items-center justify-between p-2 hover:bg-indigo-50 rounded-lg cursor-pointer transition-colors" onclick="searchFromHistory('${w}')">
                    <span class="text-gray-700 capitalize font-medium">${w}</span>
                    <span class="text-indigo-400 opacity-0 group-hover:opacity-100 transition-opacity">➜</span>
                </li>
            `).join('');
        }

        function searchFromHistory(word) {
            document.getElementById('wordInput').value = word;
            lookupWord();
        }

        function clearHistory() {
            localStorage.removeItem('wordHistory');
            displayHistory();
        }

        // Khởi tạo lịch sử khi load trang
        displayHistory();
    </script>
</body>
</html>
