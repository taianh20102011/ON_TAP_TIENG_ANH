<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordForm Focus - Exam Prep</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');

        body {
            font-family: 'Space Grotesk', sans-serif;
            transition: background 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .wf-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .word-item {
            animation: slideIn 0.3s ease-out forwards;
            opacity: 0;
        }

        @keyframes slideIn {
            from {
                transform: translateY(10px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body class="bg-[#050505] text-white min-h-screen" id="mainBody">

    <div id="authOverlay" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md">
        <div class="glass p-8 rounded-3xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-bold mb-6 tracking-tighter">WF <span class="text-indigo-500">PRO</span></h2>
            <input type="email" id="email" placeholder="Email"
                class="w-full p-3 mb-3 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-indigo-500">
            <input type="password" id="password" placeholder="Mật khẩu"
                class="w-full p-3 mb-6 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-indigo-500">
            <div class="flex gap-2">
                <button onclick="authAction('login')" class="flex-1 bg-indigo-600 p-3 rounded-xl font-bold">Vào
                    app</button>
                <button onclick="authAction('reg')" class="flex-1 border border-white/20 p-3 rounded-xl">Đăng
                    ký</button>
            </div>
            <p id="msg" class="text-xs mt-4 text-rose-400"></p>
        </div>
    </div>

    <div id="app" class="hidden max-w-6xl mx-auto p-4 lg:p-12">
        <header class="flex flex-col md:flex-row justify-between items-center gap-6 mb-12">
            <div class="flex items-center gap-4">
                <h1 class="text-3xl font-bold tracking-tighter">WORD<span class="text-indigo-500">FORM</span></h1>
                <div class="flex gap-1">
                    <button onclick="setTheme('#050505')"
                        class="w-4 h-4 rounded-full bg-black border border-white/20"></button>
                    <button onclick="setTheme('#1e1b4b')"
                        class="w-4 h-4 rounded-full bg-indigo-950 border border-white/20"></button>
                    <button onclick="setTheme('#064e3b')"
                        class="w-4 h-4 rounded-full bg-emerald-950 border border-white/20"></button>
                </div>
            </div>

            <div class="relative w-full md:w-96">
                <input type="text" id="wordInput" onkeypress="if(event.key==='Enter') findWF()"
                    placeholder="Tra từ (vđ: create, advertise)..."
                    class="w-full p-4 pl-6 bg-white/5 border border-white/10 rounded-2xl outline-none focus:ring-2 ring-indigo-500/50">
                <button onclick="findWF()"
                    class="absolute right-2 top-2 bg-white text-black px-4 py-2 rounded-xl font-bold hover:bg-indigo-500 hover:text-white transition-all">Tra</button>
            </div>

            <button onclick="firebase.auth().signOut()"
                class="text-xs opacity-50 hover:opacity-100 italic underline">Đăng xuất</button>
        </header>

        <section id="results" class="hidden">
            <div class="mb-10 text-center">
                <h2 id="rootWord" class="text-6xl font-bold uppercase tracking-widest mb-2"></h2>
                <div id="audioBtn" onclick="playAudio()"
                    class="inline-flex items-center gap-2 cursor-pointer bg-white/10 px-4 py-2 rounded-full hover:bg-white/20 transition-all">
                    <span>🔊 Phát âm</span>
                </div>
            </div>

            <div class="wf-grid">
                <div class="glass p-6 rounded-2xl border-t-2 border-indigo-500">
                    <span class="text-[10px] font-bold uppercase tracking-widest text-indigo-400">Verb</span>
                    <div id="v-list" class="mt-4 space-y-2"></div>
                </div>
                <div class="glass p-6 rounded-2xl border-t-2 border-emerald-500">
                    <span class="text-[10px] font-bold uppercase tracking-widest text-emerald-400">Noun</span>
                    <div id="n-list" class="mt-4 space-y-2"></div>
                </div>
                <div class="glass p-6 rounded-2xl border-t-2 border-amber-500">
                    <span class="text-[10px] font-bold uppercase tracking-widest text-amber-400">Adjective</span>
                    <div id="adj-list" class="mt-4 space-y-2"></div>
                </div>
                <div class="glass p-6 rounded-2xl border-t-2 border-rose-500">
                    <span class="text-[10px] font-bold uppercase tracking-widest text-rose-400">Adverb</span>
                    <div id="adv-list" class="mt-4 space-y-2"></div>
                </div>
            </div>

            <div class="mt-12">
                <h3 class="text-sm font-bold opacity-30 uppercase mb-4 tracking-widest">Lịch sử tra từ (Cloud)</h3>
                <div id="history" class="flex flex-wrap gap-2"></div>
            </div>
        </section>
    </div>

    <script>
        // CẤU HÌNH FIREBASE
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
            apiKey: "AIzaSyDNZlPQMDzCebPOY5Se0OpFsh7AkheZMOk",
            authDomain: "wordform-477a3.firebaseapp.com",
            projectId: "wordform-477a3",
            storageBucket: "wordform-477a3.firebasestorage.app",
            messagingSenderId: "152774885997",
            appId: "1:152774885997:web:6832dd5436282cb225f564",
            measurementId: "G-2G02ZGKPTT"
        };
        // 2. Khởi tạo App (Dòng này cực kỳ quan trọng, phải chạy đầu tiên)
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        } else {
            firebase.app(); // Nếu đã khởi tạo rồi thì dùng lại app cũ
        }

        // 3. Sau đó mới khai báo các biến dịch vụ
        const auth = firebase.auth();
        const db = firebase.firestore();

        // AUTH
        async function authAction(t) {
            const e = document.getElementById('email').value, p = document.getElementById('password').value;
            try {
                if (t === 'reg') await firebase.auth().createUserWithEmailAndPassword(e, p);
                else await firebase.auth().signInWithEmailAndPassword(e, p);
            } catch (err) { document.getElementById('msg').innerText = err.message; }
        }

        firebase.auth().onAuthStateChanged(u => {
            user = u;
            document.getElementById('authOverlay').classList.toggle('hidden', !!u);
            document.getElementById('app').classList.toggle('hidden', !u);
            if (u) loadHistory();
        });

        // CORE LOGIC: WORD FORM
        async function findWF() {
            const word = document.getElementById('wordInput').value.trim().toLowerCase();
            if (!word) return;

            // 1. Lấy Audio & Meaning từ Dictionary API
            const dictRes = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`).then(r => r.ok ? r.json() : null);

            // 2. Lấy Phái sinh từ Datamuse (rel_der: derived words)
            const derRes = await fetch(`https://api.datamuse.com/words?rel_der=${word}&md=p&max=20`).then(r => r.json());

            render(word, dictRes ? dictRes[0] : null, derRes);
            saveHistory(word);
        }

        function render(word, dict, derived) {
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('rootWord').innerText = word;

            // Audio
            const audioSrc = dict?.phonetics.find(p => p.audio)?.audio;
            player = audioSrc ? new Audio(audioSrc) : null;

            // Phân phối vào 4 cột
            const wf = { v: [], n: [], adj: [], adv: [] };

            // Tự thêm chính từ đang tra nếu nó có loại từ đó
            dict?.meanings.forEach(m => {
                const p = m.partOfSpeech;
                if (p.includes('verb')) wf.v.push(word);
                if (p.includes('noun')) wf.n.push(word);
                if (p.includes('adj')) wf.adj.push(word);
                if (p.includes('adv')) wf.adv.push(word);
            });

            // Lọc từ derived (chỉ lấy từ có gốc tương tự để tránh lạc đề)
            derived.forEach(d => {
                if (d.word.startsWith(word.substring(0, 3))) {
                    if (d.tags?.includes('v')) wf.v.push(d.word);
                    if (d.tags?.includes('n')) wf.n.push(d.word);
                    if (d.tags?.includes('adj')) wf.adj.push(d.word);
                    if (d.tags?.includes('adv')) wf.adv.push(d.word);
                }
            });

            const show = (id, list) => {
                const clean = [...new Set(list)].slice(0, 4);
                document.getElementById(`${id}-list`).innerHTML = clean.map(w =>
                    `<div class="word-item bg-white/5 p-3 rounded-xl border border-white/5 font-medium text-indigo-200 capitalize hover:border-white/20">${w}</div>`
                ).join('') || '<span class="text-white/20 italic">No data</span>';
            };

            show('v', wf.v); show('n', wf.n); show('adj', wf.adj); show('adv', wf.adv);
        }

        // FIREBASE & UTILS
        function setTheme(c) { document.getElementById('mainBody').style.backgroundColor = c; }
        function playAudio() { player?.play(); }

        async function saveHistory(word) {
            if (!user) return;
            await db.collection("users").doc(user.uid).collection("history").doc(word).set({
                word, time: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        function loadHistory() {
            db.collection("users").doc(user.uid).collection("history").orderBy("time", "desc").limit(15).onSnapshot(s => {
                document.getElementById('history').innerHTML = s.docs.map(d =>
                    `<button onclick="document.getElementById('wordInput').value='${d.data().word}';findWF()" class="px-3 py-1 bg-white/5 rounded-lg text-xs border border-white/10 hover:bg-indigo-500 transition-all">${d.data().word}</button>`
                ).join('');
            });
        }
    </script>
</body>

</html>
